<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Cards</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
    position: relative;
  }

  /* Image zoom */
  .card img {
    width: 100%;
    transition: transform 0.4s ease;
  }

  /* Content */
  .content {
    padding: 15px;
  }

  .card h3 {
    margin: 10px 0;
  }

  .card p {
    color: #555;
  }

  .btn {
    display: inline-block;
    padding: 8px 12px;
    background: #007BFF;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    margin-top: 10px;
  }

  /* Hover Effects */
  .card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
  }

  .card:hover img {
    transform: scale(1.1);
  }

  /* Overlay effect */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.1);
    opacity: 0;
    transition: 0.4s;
  }

  .card:hover::before {
    opacity: 1;
  }
</style>
</head>

<body>

<h2>Responsive Cards with Hover Animation</h2>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="">
    <div class="content">
      <h3>Card 1</h3>
      <p>Nice hover animation effect.</p>
      <a href="#" class="btn">Read More</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="">
    <div class="content">
      <h3>Card 2</h3>
      <p>Smooth zoom and lift effect.</p>
      <a href="#" class="btn">Read More</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="">
    <div class="content">
      <h3>Card 3</h3>
      <p>Modern UI animation style.</p>
      <a href="#" class="btn">Read More</a>
    </div>
  </div>

</div>

</body>
</html>
