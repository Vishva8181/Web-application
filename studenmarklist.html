<!DOCTYPE html>
<html>
<head>
    <title>Student Mark Calculator</title>

    <style>
        body {
            font-family: Arial;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        h3 {
            margin-top: 15px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Mark List</h2>
   <label for="m1">Mark 1</label>
    <input type="number" id="m1" placeholder="Mark 1">
    <label for="m2">Mark 2</label>
    <input type="number" id="m2" placeholder="Mark 2">
    <label for="m3">Mark 3</label>
    <input type="number" id="m3" placeholder="Mark 3">
    <label for="m4">Mark 4</label>
    <input type="number" id="m4" placeholder="Mark 4">
    <label for="m5">Mark 5</label>  
    <input type="number" id="m5" placeholder="Mark 5">

    <button onclick="calculate()"><b>Click to Calculate</b></button>

    <h3 id="total"></h3>
    <h3 id="average"></h3>
   
</div>

<script>
function calculate() {
    let m1 = Number(document.getElementById("m1").value);
    let m2 = Number(document.getElementById("m2").value);
    let m3 = Number(document.getElementById("m3").value);
    let m4 = Number(document.getElementById("m4").value);
    let m5 = Number(document.getElementById("m5").value);

    let total = m1 + m2 + m3 + m4 + m5;
    let avg = total / 5;

    

    document.getElementById("total").innerText = "Total: " + total;
    document.getElementById("average").innerText = "Average: " + avg.toFixed(2);
   
}
</script>

</body>
</html>
