<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
<label>Username
<input type="text" placeholder="Enter Your Name" id="name"> 
</label>
<br><br>
<label >Password
<input type="password" placeholder="Enter Your Password" id="password">
</label>
<br><br>
<button id="btn1">save</button>
<button id="btn2">value</button>

    </form>
    <p id="msg"></p>
</body>
<script>


    let setdata=document.getElementById("btn1");
    let getdata=document.getElementById("btn2");
    let output=document.getElementById("msg");

    setdata.onclick=function(e){
        e.preventDefault();
        let username=document.getElementById("name").value;
        let password=document.getElementById("password").value;
        localStorage.setItem("username",username);
    }
    getdata.onclick=function(e){
        e.preventDefault()
        let saveduser=localStorage.getItem("username")
        let savedpassword=localStorage.getItem("password")
        output.innerText=`welcome ${saveduser}`
        output.innerText=`welcome ${savedpassword}`
    }
</script>
</html>
